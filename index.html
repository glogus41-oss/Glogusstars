<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Stars | Мобильное управление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            touch-action: none;
        }

        .fullscreen-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1C3E9B;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .menu-card {
            max-width: 500px;
            width: 90%;
            background: #2A4EB8;
            border-radius: 40px;
            padding: 40px 30px 50px;
            text-align: center;
            box-shadow: 0 10px 0 #0F2A5E;
        }

        .resources {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            background: #1C3E9B;
            padding: 10px 20px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0F2A5E;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 20px;
        }

        .coins-text { color: #FFD700; }
        .gems-text { color: #00BFFF; }

        .game-title h1 {
            font-size: 48px;
            font-weight: 800;
            color: #FFE484;
            text-shadow: 4px 4px 0 #C87A1A;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            width: 100%;
            padding: 18px 8px;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 28px;
            cursor: pointer;
        }

        .btn-brawlers { background: #F5A623; color: #3D2B1A; box-shadow: 0 7px 0 #B4620C; }
        .btn-play { background: #3BC06F; color: white; box-shadow: 0 7px 0 #1D6B3A; }
        .btn-shop { background: #5B4B8C; color: white; box-shadow: 0 7px 0 #3A2A5E; }
        .btn:active { transform: scale(0.97); }

        .shop-screen, .brawlers-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1C3E9B;
            display: none;
            flex-direction: column;
            z-index: 15;
            padding: 20px;
            overflow-y: auto;
        }

        .shop-header, .brawlers-header {
            background: #2A4EB8;
            padding: 15px 20px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .shop-grid, .brawlers-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .shop-item, .brawler-card {
            background: #2A4EB8;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            width: 250px;
            border: 3px solid #FFE484;
            cursor: pointer;
        }

        .brawler-card {
            width: 180px;
        }

        .brawler-card.selected {
            background: #F5A623;
            border-color: white;
            box-shadow: 0 0 20px gold;
        }

        .brawler-avatar {
            width: 100px;
            height: 100px;
            background: #F4C542;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .brawler-name { font-size: 24px; font-weight: bold; color: #FFE484; }
        .brawler-rarity { font-size: 12px; margin: 5px 0; }
        .brawler-desc { font-size: 11px; color: white; }

        .shop-item-title { font-size: 24px; font-weight: bold; color: #FFE484; margin-bottom: 10px; }
        .shop-item-price { font-size: 20px; font-weight: bold; margin: 10px 0; }
        .shop-btn { background: #3BC06F; border: none; padding: 10px 20px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .shop-btn:active { transform: scale(0.95); }
        .skin-equipped { background: #FFD700; color: #1C3E9B; padding: 5px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
        .skin-unequip-btn { background: #ff5722; border: none; padding: 10px 20px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .skin-unequip-btn:active { transform: scale(0.95); }

        .game-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2a6b2f;
            display: none;
            flex-direction: column;
            z-index: 20;
        }

        .game-header {
            background: #1e2a3a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
            z-index: 30;
        }

        .back-btn { background: #ff5722; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .stats { display: flex; gap: 20px; }
        .stat { background: black; padding: 5px 15px; border-radius: 30px; }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* Мобильные элементы управления */
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 40;
            pointer-events: none;
        }

        .joystick-container {
            pointer-events: auto;
            width: 140px;
            height: 140px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .joystick-base {
            width: 120px;
            height: 120px;
            background: rgba(30,30,50,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .joystick-thumb {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            transition: transform 0.02s linear;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .attack-btn {
            pointer-events: auto;
            width: 80px;
            height: 80px;
            background: rgba(255,68,68,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            border: 3px solid #FFD700;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .attack-btn:active {
            transform: scale(0.95);
            background: rgba(255,34,34,0.9);
        }

        .controls-info {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            font-size: 14px;
            pointer-events: none;
            z-index: 35;
        }

        .loot-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: gold;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            animation: fadeOut 2s forwards;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
            .controls-info { display: none; }
            .joystick-container { width: 120px; height: 120px; }
            .joystick-base { width: 100px; height: 100px; }
            .joystick-thumb { width: 45px; height: 45px; }
            .attack-btn { width: 70px; height: 70px; font-size: 35px; }
        }
    </style>
</head>
<body>

<div id="menuScreen" class="fullscreen-menu">
    <div class="menu-card">
        <div class="resources">
            <div class="resource-item"><span>💰</span><span class="coins-text" id="coinsDisplay">0</span></div>
            <div class="resource-item"><span>💎</span><span class="gems-text" id="gemsDisplay">0</span></div>
        </div>
        <div class="game-title"><h1>BRAWL STARS</h1><p>выбери режим</p></div>
        <div class="action-buttons">
            <button class="btn btn-brawlers" id="brawlersBtn">🤜 БРАВЛЕРЫ 🤛</button>
            <button class="btn btn-play" id="playBtn">🎮 ИГРАТЬ 🎮</button>
            <button class="btn btn-shop" id="shopBtn">🛒 МАГАЗИН 🛒</button>
        </div>
        <div class="footer-note">⭐ На мобильных устройствах — джойстик и кнопка атаки</div>
    </div>
</div>

<div id="shopScreen" class="shop-screen">
    <div class="shop-header">
        <button class="back-btn-small" id="backFromShopBtn" style="background:#ff5722;border:none;padding:8px20px;border-radius:30px;color:white;">◀ НАЗАД</button>
        <h2 style="color:#FFE484">🛒 МАГАЗИН</h2>
        <div style="width:80px"></div>
    </div>
    <div class="shop-grid" id="shopGrid"></div>
</div>

<div id="brawlersScreen" class="brawlers-screen">
    <div class="brawlers-header">
        <button class="back-btn-small" id="backFromBrawlersBtn" style="background:#ff5722;border:none;padding:8px20px;border-radius:30px;color:white;">◀ НАЗАД</button>
        <h2 style="color:#FFE484">🤠 ТВОИ БРАВЛЕРЫ</h2>
        <div style="width:80px"></div>
    </div>
    <div class="brawlers-grid" id="brawlersGrid"></div>
</div>

<div id="gameScreen" class="game-screen">
    <div class="game-header">
        <button class="back-btn" id="backToMenuBtn">◀ МЕНЮ</button>
        <span id="brawlerNameDisplay">🤠 Bart</span>
        <div class="stats"><div class="stat">❤️ <span id="healthDisplay">100</span></div><div class="stat">💀 <span id="enemiesLeft">20</span></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <!-- Мобильные элементы управления -->
    <div class="mobile-controls" id="mobileControls">
        <div class="joystick-container" id="joystickContainer">
            <div class="joystick-base" id="joystickBase">
                <div class="joystick-thumb" id="joystickThumb"></div>
            </div>
        </div>
        <div class="attack-btn" id="mobileAttackBtn">🔫</div>
    </div>
    
    <div class="controls-info">🎮 WASD / стрелки — движение | 🔫 КЛИК — атака</div>
</div>

<script>
    // ==================== БРАВЛЕРЫ С УНИКАЛЬНЫМИ ТЕЛАМИ ====================
    const BRAWLERS_DATA = {
        bart: { 
            name: "BART", rarity: "⭐ Обычный", attackType: "projectile", damage: 15, 
            bodyColor: "#F4C542", desc: "стреляет скрепками",
            drawBody: (ctx, x, y, radius) => {
                ctx.fillStyle = "#F4C542";
                ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#8B5A2B";
                ctx.fillRect(x - radius+5, y - radius+5, radius*0.6, radius*0.3);
                ctx.fillStyle = "#2F1E0E";
                ctx.beginPath(); ctx.arc(x - radius*0.4, y - radius*0.2, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.4, y - radius*0.2, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#8B5A2B";
                ctx.fillRect(x - radius*0.7, y - radius*0.9, radius*1.4, radius*0.3);
                ctx.fillStyle = "#5C3A1A";
                ctx.beginPath(); ctx.moveTo(x - radius*0.5, y + radius*0.1); ctx.quadraticCurveTo(x, y + radius*0.3, x + radius*0.5, y + radius*0.1); ctx.fill();
            }
        },
        griz: { 
            name: "ГРИЗ", rarity: "🟢 Редкий", attackType: "poison", damage: 23, 
            bodyColor: "#6B8E23", desc: "отравляющая пуля",
            drawBody: (ctx, x, y, radius) => {
                ctx.fillStyle = "#6B8E23";
                ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#556B2F";
                ctx.beginPath(); ctx.arc(x - radius*0.5, y - radius*0.5, radius*0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.5, y - radius*0.5, radius*0.3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#3E5A1A";
                ctx.beginPath(); ctx.ellipse(x - radius*0.35, y - radius*0.1, 4, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(x + radius*0.35, y - radius*0.1, 4, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#2F1E0E";
                ctx.beginPath(); ctx.arc(x - radius*0.4, y - radius*0.15, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.4, y - radius*0.15, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#3E5A1A";
                ctx.beginPath(); ctx.ellipse(x, y + radius*0.1, radius*0.25, radius*0.15, 0, 0, Math.PI*2); ctx.fill();
            }
        },
        magnus: { 
            name: "MAGNUS", rarity: "🟢 Редкий", attackType: "fireball", damage: 23, 
            bodyColor: "#E25822", desc: "огненные шары",
            drawBody: (ctx, x, y, radius) => {
                ctx.fillStyle = "#E25822";
                ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#B84010";
                ctx.beginPath(); ctx.moveTo(x - radius, y - radius*0.5); ctx.lineTo(x, y - radius*1.2); ctx.lineTo(x + radius, y - radius*0.5); ctx.fill();
                ctx.fillStyle = "#8B0000";
                ctx.beginPath(); ctx.ellipse(x, y + radius*0.2, radius*0.5, radius*0.3, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFD700";
                ctx.beginPath(); ctx.arc(x - radius*0.35, y - radius*0.1, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.35, y - radius*0.1, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FF6600";
                for(let i = -2; i <= 2; i++) {
                    ctx.beginPath(); ctx.moveTo(x + i*6, y - radius+5); ctx.lineTo(x + i*6, y - radius-8); ctx.lineTo(x + i*6 + 3, y - radius-3); ctx.fill();
                }
            }
        },
        shadow: { 
            name: "ТЕНЬ", rarity: "🟣 Эпический", attackType: "melee", damage: 6, 
            bodyColor: "#4A4A6A", desc: "бьёт кулаками",
            drawBody: (ctx, x, y, radius) => {
                ctx.fillStyle = "#4A4A6A";
                ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#2A2A4A";
                ctx.beginPath(); ctx.rect(x - radius*0.7, y - radius*0.5, radius*1.4, radius*0.8); ctx.fill();
                ctx.fillStyle = "#FF4444";
                ctx.beginPath(); ctx.moveTo(x, y - radius*0.7); ctx.lineTo(x - 5, y - radius*0.3); ctx.lineTo(x + 5, y - radius*0.3); ctx.fill();
                ctx.fillStyle = "#FFFFFF";
                ctx.beginPath(); ctx.arc(x - radius*0.3, y - radius*0.1, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.3, y - radius*0.1, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#C0C0C0";
                ctx.beginPath(); ctx.moveTo(x + radius*0.6, y); ctx.lineTo(x + radius*0.9, y - 5); ctx.lineTo(x + radius*0.9, y + 5); ctx.fill();
            }
        },
        vector: { 
            name: "ВЕКТОР", rarity: "🟣 Эпический", attackType: "explosion", damage: 10, 
            bodyColor: "#8A2BE2", desc: "взрыв вокруг",
            drawBody: (ctx, x, y, radius) => {
                ctx.fillStyle = "#8A2BE2";
                ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#6A1BA2";
                ctx.beginPath(); ctx.rect(x - radius*0.5, y - radius*0.3, radius, radius*0.6); ctx.fill();
                ctx.fillStyle = "#00FFFF";
                ctx.beginPath(); ctx.arc(x - radius*0.3, y - radius*0.1, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.3, y - radius*0.1, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFD700";
                ctx.beginPath(); ctx.moveTo(x, y - radius); ctx.lineTo(x - 3, y - radius*0.8); ctx.lineTo(x + 3, y - radius*0.8); ctx.fill();
                for(let i = 0; i < 4; i++) {
                    let angle = i * Math.PI*2/4;
                    let x2 = x + Math.cos(angle) * radius*0.8;
                    let y2 = y + Math.sin(angle) * radius*0.8;
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath(); ctx.arc(x2, y2, 3, 0, Math.PI*2); ctx.fill();
                }
            }
        },
        paster: { 
            name: "ПАСТЕР", rarity: "🟣 Эпический", attackType: "dot", damage: 3, 
            bodyColor: "#C0C0C0", desc: "луч на 10 сек",
            drawBody: (ctx, x, y, radius) => {
                ctx.fillStyle = "#C0C0C0";
                ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#E0E0E0";
                ctx.beginPath(); ctx.ellipse(x, y - radius*0.3, radius*0.5, radius*0.3, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#808080";
                ctx.beginPath(); ctx.arc(x - radius*0.35, y - radius*0.1, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + radius*0.35, y - radius*0.1, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFFFFF";
                ctx.beginPath(); ctx.ellipse(x, y + radius*0.15, radius*0.4, radius*0.2, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#AAAAAA";
                for(let i = 0; i < 3; i++) {
                    ctx.beginPath(); ctx.moveTo(x - 8 + i*8, y + radius*0.3); ctx.lineTo(x - 5 + i*8, y + radius*0.5); ctx.lineTo(x - 11 + i*8, y + radius*0.5); ctx.fill();
                }
            }
        }
    };

    // Скины
    let ownedSkins = [];
    let equippedSkin = null;
    const SKINS = { cowboy_bart: { name: "Cowboy Bart", brawler: "bart", price: 57, priceType: "gems", bodyColor: "#DAA5
