<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ГлогусСтарс - 3D Глобус со Звёздами</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 18px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            border-left: 3px solid #ffaa44;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls-hint { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ ГЛОГУССТАРС ✨ | Вращающийся глобус | Звёздное сияние
    </div>
    <div id="controls-hint">
        🖱️ Мышь: вращать камеру | 📜 Скролл: приблизить
    </div>

    <!-- Подключаем Three.js и вспомогательные расширения через CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Инициализация сцены, камеры, рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318); // глубокий космический синий
        scene.fog = new THREE.FogExp2(0x030318, 0.0008); // легкая дымка для глубины

        // Камера: перспектива, угол обзора, соотношение, ближняя/дальняя плоскости
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- Эффекты постобработки (свечение для звёзд и глобуса) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;  // яркость порога
        bloomPass.strength = 0.6;
        bloomPass.radius = 0.5;
        
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- Орбит контрол для интерактива (можно вращать и приближать) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // плавное затухание
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.enablePan = false;
        controls.autoRotate = false;            // отключаем автовращение контролов, вращать будем сам глобус
        controls.target.set(0, 0, 0);
        
        // --- СОЗДАНИЕ ГЛОБУСА (Земля с текстурой высокого качества) ---
        // Используем качественную текстуру Земли от Three.js примеров (диффузная + спекуляр + нормаль для рельефа)
        // Загружаем текстуры с CDN, чтобы глобус выглядел реалистично
        
        const textureLoader = new THREE.TextureLoader();
        
        // Карта цветов Земли (дневная)
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        // Карта облаков (полупрозрачная для эффекта)
        const earthCloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        // Карта рельефа (нормалей)
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        // Спекулярная карта (блики воды)
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        
        // Основная сфера глобуса
        const earthGeometry = new THREE.SphereGeometry(1.0, 128, 128);
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            normalMap: earthNormalMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 5,
            emissive: new THREE.Color(0x000022), // легкое свечение с темной стороны
            emissiveIntensity: 0.15
        });
        
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Слой облаков (прозрачная сфера чуть большего радиуса)
        const cloudGeometry = new THREE.SphereGeometry(1.01, 128, 128);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: earthCloudMap,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // Добавим атмосферное свечение (внешняя оболочка с эффектом)
        const atmosphereGeometry = new THREE.SphereGeometry(1.04, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x88aaff,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);
        
        // --- ЗВЁЗДНОЕ ПОЛЕ (динамические мерцающие частицы) ---
        // Создаём большое количество частиц, разбросанных в пространстве
        
        const starCount = 3000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        
        // Разброс звёзд в сфере радиусом 150-250, но с разной удалённостью для глубины
        for (let i = 0; i < starCount; i++) {
            // Используем сферические координаты с случайным радиусом
            const radius = 80 + Math.random() * 120; // от 80 до 200
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            starPositions[i*3] = x;
            starPositions[i*3+1] = y;
            starPositions[i*3+2] = z;
            
            // Цвет звёзд: от холодного белого до слегка голубоватого/желтоватого
            const colorVal = 0.6 + Math.random() * 0.5;
            const r = colorVal * (Math.random() > 0.7 ? 0.9 : 1.0);
            const g = colorVal * (Math.random() > 0.6 ? 0.95 : 1.0);
            const b = colorVal * (0.8 + Math.random() * 0.4);
            
            starColors[i*3] = r;
            starColors[i*3+1] = g;
            starColors[i*3+2] = b;
        }
        
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        
        // Материал для звёзд (точечные спрайты с круглой формой)
        // Создаём canvas текстуру для круглого градиентного свечения
        const createStarTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 14);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.5, 'rgba(255,255,200,0.8)');
            gradient.addColorStop(0.8, 'rgba(255,200,100,0.3)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        };
        
        const starMaterial = new THREE.PointsMaterial({
            size: 0.35,
            map: createStarTexture(),
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending
        });
        
        const starField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starField);
        
        // Добавим дополнительный слой очень дальних, тусклых звёзд (мелкие точки)
        const distantStarCount = 1500;
        const distantGeo = new THREE.BufferGeometry();
        const distantPositions = new Float32Array(distantStarCount * 3);
        for (let i = 0; i < distantStarCount; i++) {
            // Распределение равномерно по сфере большего радиуса
            const rad = 180 + Math.random() * 100;
            const theta2 = Math.random() * Math.PI * 2;
            const phi2 = Math.acos(2 * Math.random() - 1);
            distantPositions[i*3] = rad * Math.sin(phi2) * Math.cos(theta2);
            distantPositions[i*3+1] = rad * Math.sin(phi2) * Math.sin(theta2);
            distantPositions[i*3+2] = rad * Math.cos(phi2);
        }
        distantGeo.setAttribute('position', new THREE.BufferAttribute(distantPositions, 3));
        const distantStarMat = new THREE.PointsMaterial({
            color: 0xaaccff,
            size: 0.12,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const distantStars = new THREE.Points(distantGeo, distantStarMat);
        scene.add(distantStars);
        
        // --- МЕРЦАНИЕ ЗВЁЗД (анимация с использованием времени) ---
        // Сохраним оригинальные цвета и размеры для анимации
        // У каждого starPoints можно анимировать opacity или размер, но проще - глобальное мерцание через смену прозрачности?
        // Сделаем пульсацию для starField и distantStars с разной скоростью
        // Также добавим эффект "летящих" метеоров? Нет, оставим элегантное мерцание.
        
        // Создадим массив для индивидуального мерцания ярких звёзд (выборочно)
        // Для упрощения сделаем общую анимацию opacity и небольшую ротацию звездного поля для динамики
        
        // Дополнительно: добавим несколько крупных "сияющих" звезд (спрайты)
        const bigStarsCount = 80;
        const bigStarsGeometry = new THREE.BufferGeometry();
        const bigStarsPos = [];
        for (let i = 0; i < bigStarsCount; i++) {
            const rad = 70 + Math.random() * 130;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            bigStarsPos.push(rad * Math.sin(phi) * Math.cos(theta));
            bigStarsPos.push(rad * Math.sin(phi) * Math.sin(theta));
            bigStarsPos.push(rad * Math.cos(phi));
        }
        bigStarsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(bigStarsPos), 3));
        const bigStarMat = new THREE.PointsMaterial({
            color: 0xffdd99,
            size: 0.55,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const bigStars = new THREE.Points(bigStarsGeometry, bigStarMat);
        scene.add(bigStars);
        
        // --- ЭФФЕКТ МГНОВЕННЫХ "ПАДАЮЩИХ ЗВЕЗД" (опционально) - добавим пару линий? нет, ограничимся мерцанием.
        
        // --- ОСВЕЩЕНИЕ (источники света для реалистичного глобуса) ---
        // Основной направленный свет (имитация солнца)
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 3, 5);
        sunLight.castShadow = false; // для производительности
        scene.add(sunLight);
        
        // Дополнительный мягкий свет сзади для подсветки теней
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.4);
        backLight.position.set(-3, -1, -4);
        scene.add(backLight);
        
        // Заполняющий свет со всех сторон, чтобы тени не были слишком черными
        const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
        scene.add(ambientLight);
        
        // Подсветка глобуса с нижней части (красивый эффект)
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);
        
        // Легкая подсветка звездного поля - не нужна, сами светятся
        
        // --- ВРАЩЕНИЕ ГЛОБУСА И ОБЛАКОВ ---
        // Глобус вращается с постоянной скоростью, облака чуть быстрее для эффекта движения
        
        let time = 0;
        
        // Анимация мерцания звезд: будем менять opacity материалов и размеры частиц
        // Для пульсации создадим несколько фаз
        let starPulseSpeed = 0.8;
        let bigStarPulseSpeed = 1.2;
        
        // Сохраним базовые размеры
        const baseStarSize = starMaterial.size;
        const baseBigStarSize = bigStarMat.size;
        const baseDistantOpacity = distantStarMat.opacity;
        
        // Дополнительно: добавим случайное смещение для некоторых звезд через шейдер? Упростим анимацию через синус
        
        // Также можно добавить вращение всей звездной сферы очень медленное для эффекта движения
        let starRotationY = 0;
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012; // плавное увеличение времени
            
            // Вращение глобуса и облаков
            earth.rotation.y += 0.0025;
            clouds.rotation.y += 0.0032; // облака двигаются чуть быстрее
            atmosphere.rotation.y += 0.0022;
            
            // Динамическое мерцание звезд: изменяем прозрачность и размер в зависимости от времени
            // Используем синусоидальные волны с разными частотами для разных слоев
            
            // Яркие звезды - пульсация
            const pulse1 = 0.7 + Math.sin(time * 1.8) * 0.2;
            const pulse2 = 0.6 + Math.sin(time * 2.3) * 0.25;
            
            starMaterial.opacity = 0.7 + Math.sin(time * 1.2) * 0.2;
            starMaterial.size = baseStarSize * (0.85 + Math.sin(time * 1.5) * 0.15);
            
            bigStarMat.opacity = 0.8 + Math.sin(time * 1.9) * 0.2;
            bigStarMat.size = baseBigStarSize * (0.8 + Math.sin(time * 2.1) * 0.2);
            
            distantStarMat.opacity = baseDistantOpacity * (0.7 + Math.sin(time * 0.9) * 0.3);
            
            // Медленное вращение звездного поля для создания иллюзии движения космоса
            starField.rotation.y += 0.0003;
            starField.rotation.x += 0.00015;
            distantStars.rotation.y -= 0.0002;
            distantStars.rotation.x += 0.0001;
            bigStars.rotation.y += 0.00025;
            bigStars.rotation.z += 0.0001;
            
            // Небольшое изменение цвета атмосферы или свечения (для красоты)
            const hueShift = (Math.sin(time * 0.3) * 0.02);
            atmosphereMaterial.color.setHSL(0.55 + hueShift, 0.7, 0.6);
            
            // Обновление эффекта Bloom (легкая динамика силы свечения)
            bloomPass.strength = 0.55 + Math.sin(time * 0.7) * 0.08;
            
            // Обновление контроля (если используется авто вращение камеры - нет, но мы вращаем объект)
            controls.update(); // обновляем, чтобы мышь работала плавно
            
            // --- ДОПОЛНИТЕЛЬНЫЙ ЭФФЕКТ: летающие частицы "комет" (очень редко, добавим простой sparkle) ---
            // Вместо сложных частиц, просто добавим мерцающие блики на глобусе - не обязательно
            
            // Рендеринг через эффект композер
            effectComposer.render();
        }
        
        // Запускаем анимацию
        animate();
        
        // --- АДАПТАЦИЯ ПОД ИЗМЕНЕНИЕ РАЗМЕРА ОКНА ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Небольшая задержка для загрузки текстур (показываем сообщение, но оно и так быстро)
        console.log('ГлогусСтарс запущен! Наслаждайтесь космическим видом 🌍✨');
        
        // Добавим небольшую звездную туманность в фоне (опционально, просто для атмосферы)
        // Создадим несколько случайных дымчатых облаков на заднем плане с помощью дополнительной сферы с текстурой?
        // Для производительности не будем перегружать.
        
        // Но добавим одну большую, очень рассеянную сферу с низкой непрозрачностью (имитация галактики)
        const galaxyGeometry = new THREE.SphereGeometry(45, 32, 32);
        const galaxyMaterial = new THREE.MeshBasicMaterial({
            color: 0x112244,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const galaxyBackground = new THREE.Mesh(galaxyGeometry, galaxyMaterial);
        scene.add(galaxyBackground);
        
        // Также добавим очень маленькие мерцающие точки на поверхности глобуса? нет, достаточно
    </script>
</body>
</html>
