<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ МегаКликер | Эпичный кликер с улучшениями</title>
    <!-- Font Awesome 6 (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0b1020 0%, #0a0f1a 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Контейнер игры */
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(90, 150, 255, 0.2);
        }

        /* Сетка: главный кликер слева, улучшения справа */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.8rem;
        }

        /* ЛЕВАЯ ПАНЕЛЬ — КЛИКЕР И СТАТИСТИКА */
        .clicker-panel {
            background: rgba(10, 18, 32, 0.7);
            border-radius: 2rem;
            padding: 1.8rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(66, 153, 225, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .stats {
            text-align: center;
            margin-bottom: 2rem;
        }

        .coin-display {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 2.2rem;
            font-weight: 800;
            color: #FFD966;
            text-shadow: 0 0 6px #ffb347;
            backdrop-filter: blur(4px);
            border: 1px solid #ffd96655;
            margin-bottom: 1.5rem;
        }

        .coin-display i {
            font-size: 2rem;
            color: #FFB347;
        }

        .stat-grid {
            display: flex;
            justify-content: space-between;
            background: #0a0f1ccc;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 0.5rem;
            gap: 1rem;
        }

        .stat-card {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8da3d1;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #f0f3fa;
        }

        /* КНОПКА КЛИКА */
        .click-button {
            background: radial-gradient(circle at 30% 20%, #f5b042, #e67e22);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.5);
            transition: transform 0.08s linear, box-shadow 0.1s;
            border: none;
            background-size: 120%;
        }

        .click-button:active {
            transform: scale(0.96);
            box-shadow: 0 8px 15px -5px black;
        }

        .click-button i {
            font-size: 5rem;
            color: white;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        .click-power-badge {
            background: #2c3e66;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        /* ПРАВАЯ ПАНЕЛЬ — УЛУЧШЕНИЯ + ДОСТИЖЕНИЯ (вкладки) */
        .upgrades-panel {
            background: rgba(10, 18, 32, 0.7);
            border-radius: 2rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(66, 153, 225, 0.3);
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #2a3a60;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.7rem 1.2rem;
            font-weight: 600;
            color: #9bb5e6;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 2rem 2rem 0 0;
            transition: 0.1s;
        }

        .tab-btn.active {
            color: #ffd966;
            background: #111e32;
            box-shadow: 0 -2px 0 #ffd966;
        }

        .tab-content {
            display: none;
            animation: fade 0.2s ease;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .tab-content.active {
            display: block;
        }

        /* Список улучшений */
        .upgrade-item {
            background: #0e1625;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.1s;
            border-left: 4px solid #f39c12;
        }

        .upgrade-info h4 {
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }

        .upgrade-info p {
            font-size: 0.7rem;
            color: #8db2e0;
        }

        .upgrade-stats {
            font-size: 0.8rem;
            font-weight: 700;
            color: #f0c674;
        }

        .upgrade-buy {
            background: #2c3e50;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #ffe0a3;
            cursor: pointer;
            transition: 0.1s;
        }

        .upgrade-buy:active { transform: scale(0.96);}
        .upgrade-buy.disabled { opacity: 0.5; pointer-events: none;}

        .achievement-item {
            background: #0e1625aa;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid #2e4a76;
        }

        .achievement-icon {
            font-size: 1.8rem;
        }
        .achievement-text {
            flex:1;
        }

        .toast-notify {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3e;
            backdrop-filter: blur(12px);
            color: #ffde9c;
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
            border-left: 5px solid #f39c12;
            box-shadow: 0 4px 15px black;
            transition: 0.2s;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* floating numbers */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.6rem;
            color: #ffda88;
            text-shadow: 0 0 5px #ff9800;
            z-index: 2000;
            animation: floatUp 0.7s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(0.8);}
            100% { opacity: 0; transform: translateY(-80px) scale(1.2);}
        }

        .reset-btn {
            background: #371f2b;
            border: none;
            color: #ffa597;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin-top: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.1s;
        }

        @media (max-width: 850px) {
            .dashboard { grid-template-columns: 1fr; gap: 1rem; }
            .click-button { width: 160px; height: 160px; }
            .click-button i { font-size: 3rem; }
            .coin-display { font-size: 1.2rem; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111c2a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 10px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="dashboard">
        <!-- Левая секция: кликер -->
        <div class="clicker-panel">
            <div class="stats">
                <div class="coin-display">
                    <i class="fas fa-coins"></i>
                    <span id="coinAmount">0</span>
                </div>
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-label"><i class="fas fa-hand-peace"></i> Сила клика</div><div class="stat-value" id="clickPowerDisplay">1</div></div>
                    <div class="stat-card"><div class="stat-label"><i class="fas fa-charging-station"></i> В сек.</div><div class="stat-value" id="cpsDisplay">0</div></div>
                    <div class="stat-card"><div class="stat-label"><i class="fas fa-chart-line"></i> Кликов</div><div class="stat-value" id="totalClicksDisplay">0</div></div>
                </div>
            </div>
            <div class="click-button" id="clickableButton">
                <i class="fas fa-hand-fist"></i>
                <div class="click-power-badge">КЛИКНИ!</div>
            </div>
            <button class="reset-btn" id="resetGameBtn"><i class="fas fa-trash-alt"></i> Перезапустить игру</button>
        </div>

        <!-- Правая секция: вкладки улучшения / достижения -->
        <div class="upgrades-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="upgradesTab"><i class="fas fa-rocket"></i> Улучшения</button>
                <button class="tab-btn" data-tab="achievementsTab"><i class="fas fa-trophy"></i> Достижения</button>
            </div>
            <div class="tab-content active" id="upgradesTab">
                <div id="upgradesList"></div>
            </div>
            <div class="tab-content" id="achievementsTab">
                <div id="achievementsList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- КОНФИГУРАЦИЯ УЛУЧШЕНИЙ ----------
    const UPGRADES_DATA = [
        { id: "strongClick", name: "💪 Крепкий клик", type: "click", bonusClick: 1, bonusCps: 0, baseCost: 10, costMultiplier: 1.25, desc: "+1 к силе клика" },
        { id: "autoClicker", name: "⚙️ Автокликер", type: "auto", bonusClick: 0, bonusCps: 0.5, baseCost: 20, costMultiplier: 1.25, desc: "+0.5 монет/сек" },
        { id: "doubleStrike", name: "⚡ Двойной удар", type: "click", bonusClick: 2, bonusCps: 0, baseCost: 50, costMultiplier: 1.3, desc: "+2 к силе клика" },
        { id: "robotFarm", name: "🤖 Робоферма", type: "auto", bonusClick: 0, bonusCps: 2, baseCost: 80, costMultiplier: 1.3, desc: "+2 монет/сек" },
        { id: "megaClick", name: "💥 Мега клик", type: "click", bonusClick: 5, bonusCps: 0, baseCost: 200, costMultiplier: 1.35, desc: "+5 к силе клика" },
        { id: "quantumGen", name: "🌀 Квантовый ген.", type: "auto", bonusClick: 0, bonusCps: 10, baseCost: 500, costMultiplier: 1.35, desc: "+10 монет/сек" }
    ];

    // ДОСТИЖЕНИЯ
    const ACHIEVEMENTS = [
        { id: "ach1", name: "Новичок", condition: "clicks", target: 100, reward: 100, desc: "100 кликов", claimed: false, rewardGiven: false },
        { id: "ach2", name: "Кликер", condition: "clicks", target: 1000, reward: 500, desc: "1000 кликов", claimed: false, rewardGiven: false },
        { id: "ach3", name: "Профи", condition: "clicks", target: 5000, reward: 2000, desc: "5000 кликов", claimed: false, rewardGiven: false },
        { id: "ach4", name: "Легенда", condition: "clicks", target: 25000, reward: 10000, desc: "25000 кликов", claimed: false, rewardGiven: false },
        { id: "ach5", name: "Первая тысяча", condition: "coinsEarned", target: 1000, reward: 200, desc: "Заработано 1000 монет", claimed: false, rewardGiven: false },
        { id: "ach6", name: "Магнат", condition: "coinsEarned", target: 10000, reward: 1500, desc: "Заработано 10k монет", claimed: false, rewardGiven: false },
        { id: "ach7", name: "Миллионер", condition: "coinsEarned", target: 100000, reward: 25000, desc: "Заработано 100k монет", claimed: false, rewardGiven: false },
        { id: "ach8", name: "Инвестор", condition: "upgradesBought", target: 15, reward: 500, desc: "Куплено 15 улучшений", claimed: false, rewardGiven: false }
    ];

    // Глобальные переменные игры
    let coins = 0;                  // текущие монеты
    let totalClicks = 0;           // всего кликов
    let totalCoinsEarned = 0;      // заработано монет за всё время
    let totalUpgradesBought = 0;    // общее количество купленных улучшений (сумма уровней)
    
    // Уровни улучшений
    let upgradesLevels = {};
    // бонусы
    let currentClickPower = 1;
    let currentCPS = 0;
    
    // Состояние достижений (копируем)
    let achievementsState = JSON.parse(JSON.stringify(ACHIEVEMENTS));
    
    // DOM элементы
    const coinSpan = document.getElementById("coinAmount");
    const clickPowerSpan = document.getElementById("clickPowerDisplay");
    const cpsSpan = document.getElementById("cpsDisplay");
    const totalClicksSpan = document.getElementById("totalClicksDisplay");
    const upgradesContainer = document.getElementById("upgradesList");
    const achievementsContainer = document.getElementById("achievementsList");
    const clickBtn = document.getElementById("clickableButton");
    const resetBtn = document.getElementById("resetGameBtn");
    
    // UI helpers
    function showToast(message, isError = false) {
        let toast = document.createElement("div");
        toast.className = "toast-notify";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-gem'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // Создание летающей цифры
    function createFloatingNumber(value, x, y) {
        const el = document.createElement("div");
        el.className = "floating-number";
        el.innerText = `+${Math.floor(value)}`;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }
    
    // Пересчёт силы клика и CPS
    function recalcStats() {
        let clickBonus = 0;
        let cpsBonus = 0;
        for (let up of UPGRADES_DATA) {
            let level = upgradesLevels[up.id] || 0;
            if (up.type === "click") clickBonus += up.bonusClick * level;
            if (up.type === "auto") cpsBonus += up.bonusCps * level;
        }
        currentClickPower = 1 + clickBonus;
        currentCPS = cpsBonus;
    }
    
    // Сохранение в localStorage
    function saveGame() {
        const saveData = {
            coins: coins,
            totalClicks: totalClicks,
            totalCoinsEarned: totalCoinsEarned,
            totalUpgradesBought: totalUpgradesBought,
            upgradesLevels: upgradesLevels,
            achievements: achievementsState.map(a => ({ id: a.id, claimed: a.claimed, rewardGiven: a.rewardGiven })),
            timestamp: Date.now()
        };
        localStorage.setItem("megaClickerSave", JSON.stringify(saveData));
    }
    
    // Загрузка и оффлайн прогресс
    function loadGame() {
        const raw = localStorage.getItem("megaClickerSave");
        if (raw) {
            try {
                const data = JSON.parse(raw);
                coins = data.coins || 0;
                totalClicks = data.totalClicks || 0;
                totalCoinsEarned = data.totalCoinsEarned || 0;
                totalUpgradesBought = data.totalUpgradesBought || 0;
                upgradesLevels = data.upgradesLevels || {};
                // восстановить достижения
                if (data.achievements) {
                    for (let savedAch of data.achievements) {
                        let found = achievementsState.find(a => a.id === savedAch.id);
                        if (found) {
                            found.claimed = savedAch.claimed;
                            found.rewardGiven = savedAch.rewardGiven;
                        }
                    }
                }
                // оффлайн доход
                const lastTimestamp = data.timestamp;
                if (lastTimestamp && currentCPS > 0) {
                    const now = Date.now();
                    const secondsDiff = Math.floor((now - lastTimestamp) / 1000);
                    if (secondsDiff > 0 && secondsDiff < 86400) {  // макс 1 день разумно
                        const offlineCoins = secondsDiff * currentCPS;
                        if (offlineCoins > 0) {
                            coins += offlineCoins;
                            totalCoinsEarned += offlineCoins;
                            showToast(`✨ За время отсутствия вы получили ${Math.floor(offlineCoins)} монет!`, false);
                        }
                    }
                }
            } catch(e) { console.warn(e);}
        }
        // Инициализация отсутствующих уровней
        for (let up of UPGRADES_DATA) {
            if (upgradesLevels[up.id] === undefined) upgradesLevels[up.id] = 0;
        }
        recalcStats();
        updateUI();
        checkAchievements(); // после восстановления проверим достижения
    }
    
    // Покупка улучшения
    function buyUpgrade(upgradeId) {
        const upgrade = UPGRADES_DATA.find(u => u.id === upgradeId);
        if (!upgrade) return;
        const level = upgradesLevels[upgrade.id] || 0;
        let cost = Math.floor(upgrade.baseCost * Math.pow(upgrade.costMultiplier, level));
        if (coins < cost) {
            showToast(`Не хватает монет! Нужно ${Math.floor(cost)}`, true);
            return;
        }
        // Покупка
        coins -= cost;
        upgradesLevels[upgrade.id] = level + 1;
        totalUpgradesBought++;
        totalCoinsEarned += 0; // покупка не добавляет к earned, но важно
        recalcStats();
        updateUI();
        saveGame();
        showToast(`💰 Вы купили ${upgrade.name} (ур.${level+1})`, false);
        checkAchievements();  // проверить достижения после покупки (количество купленных)
    }
    
    // Обновление интерфейса
    function updateUI() {
        coinSpan.innerText = Math.floor(coins);
        clickPowerSpan.innerText = currentClickPower;
        cpsSpan.innerText = currentCPS.toFixed(1);
        totalClicksSpan.innerText = totalClicks;
        
        // Отрисовка улучшений
        upgradesContainer.innerHTML = "";
        for (let up of UPGRADES_DATA) {
            const level = upgradesLevels[up.id] || 0;
            let cost = Math.floor(up.baseCost * Math.pow(up.costMultiplier, level));
            const hasMoney = coins >= cost;
            const div = document.createElement("div");
            div.className = "upgrade-item";
